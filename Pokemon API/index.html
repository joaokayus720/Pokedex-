<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pokédex</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="my-4 text-center">Pokédex Premium</h1>

        <!-- Barra de busca + botões de controle -->
        <div class="row justify-content-center mb-3">
            <div class="col-md-8">
                <div class="search-wrapper">
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Ex: pikachu, charizard, mewtwo" autocomplete="off">
                        <div class="input-group-append">
                            <button id="searchBtn" class="btn btn-warning"><i class="fas fa-search"></i> Buscar</button>
                            <button id="clearSearchBtn" class="btn btn-secondary"><i class="fas fa-times"></i> Limpar</button>
                        </div>
                    </div>
                    <div id="suggestionsBox" class="suggestions-box"></div>
                </div>
            </div>
        </div>

        <!-- Botões de ação principais -->
        <div class="row justify-content-center mb-3">
            <div class="col-md-8 d-flex justify-content-between flex-wrap">
                <button id="showFavBtn" class="btn btn-danger mb-2"><i class="fas fa-heart"></i> Favoritos</button>
                <button id="showAllBtn" class="btn btn-success mb-2"><i class="fas fa-globe"></i> Todos os Pokémon</button>
            </div>
        </div>

        <!-- Botões de navegação (paginação) -->
        <div id="navButtons" class="d-flex justify-content-between my-3">
            <button id="prevBtn" class="btn btn-primary" disabled><i class="fas fa-arrow-left"></i> Anterior</button>
            <button id="nextBtn" class="btn btn-primary">Próxima <i class="fas fa-arrow-right"></i></button>
        </div>

        <!-- Grid de Pokémon -->
        <div id="pokemon-list" class="row"></div>

        <!-- Área de mensagens -->
        <div id="loadingMsg" class="text-center my-4" style="display: none;">
            <div class="spinner-border text-primary" role="status"><span class="sr-only">Carregando...</span></div>
            <p class="mt-2">Carregando Pokémons...</p>
        </div>
        <div id="errorMsg" class="alert alert-danger text-center my-3" style="display: none;" role="alert">
            <i class="fas fa-exclamation-triangle"></i> Erro ao carregar. Tente novamente.
        </div>
        <div id="noResultMsg" class="alert alert-warning text-center my-3" style="display: none;" role="alert">
            <i class="fas fa-frown"></i> Nenhum Pokémon encontrado.
        </div>
    </div>

    <!-- Modal de Detalhes do Pokémon -->
    <div class="modal fade" id="pokemonModal" tabindex="-1" role="dialog" aria-labelledby="pokemonModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #dc0a2d, #b00726); color: white;">
                    <h5 class="modal-title" id="pokemonModalLabel"><i class="fas fa-paw"></i> Detalhes do Pokémon</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Fechar" style="color: white;">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="Imagem do Pokémon" class="img-fluid mb-3" style="max-width: 200px;">
                    <h3 id="modalName" class="text-capitalize"></h3>
                    <p><strong><i class="fas fa-hashtag"></i> ID:</strong> <span id="modalId"></span></p>
                    <p><strong><i class="fas fa-dragon"></i> Tipo(s):</strong> <span id="modalTypes"></span></p>
                    <p><strong><i class="fas fa-arrow-up"></i> Altura:</strong> <span id="modalHeight"></span> m</p>
                    <p><strong><i class="fas fa-weight-hanging"></i> Peso:</strong> <span id="modalWeight"></span> kg</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
